# JitPack build configuration.
#
# JitPack consumes this file when a consumer pulls a tag from
# https://jitpack.io/com.github.paritytech.truapi/. It tells JitPack
# which JDK to use and which Gradle command to run to produce the
# Maven publication. Consumers depend on the resulting artifact as
# `com.github.paritytech.truapi:truapi-android:<tag>`.

jdk:
  - openjdk17

install:
  - gradle :truapi-android:publishReleasePublicationToMavenLocal
