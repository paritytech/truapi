[package]
name = "truapi-server"
version = "0.1.0"
edition.workspace = true
description = "TrUAPI server runtime: dispatcher, frames, SCALE, streams"
# MIT for this crate's own code; the smoldot light-client glue under
# src/smoldot_provider/wasm_*.rs is vendored from subxt-lightclient under
# Apache-2.0 (see THIRD_PARTY_NOTICES.md and the per-file SPDX headers).
license = "MIT AND Apache-2.0"

[lib]
crate-type = ["rlib", "cdylib", "staticlib"]

[features]
default = []
ws-bridge = ["dep:tokio", "dep:tokio-tungstenite", "dep:rand"]
smoldot = ["dep:smoldot-light", "dep:smoldot"]

[dependencies]
truapi = { path = "../truapi" }
truapi-platform = { path = "../truapi-platform" }
async-trait = "0.1"
derive_more = { version = "2", features = ["display"] }
futures = "0.3"
futures-timer = { version = "3", features = ["wasm-bindgen"] }
parity-scale-codec = { version = "3", features = ["derive"] }
serde_json = "1"
thiserror = "1"
unicode-normalization = "0.1"
url = "2"
uniffi = "0.29.4"
hex = "0.4"
blake2 = "0.10"
blake2-rfc = "0.2"
bs58 = "0.5"
schnorrkel = { version = "0.11.5", default-features = false, features = ["alloc", "getrandom"] }
getrandom = { version = "0.2", features = ["js"] }
p256 = { version = "0.13", default-features = false, features = ["ecdh"] }
hkdf = "0.12"
sha2 = "0.10"
aes-gcm = { version = "0.10", default-features = false, features = ["aes", "alloc"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
smoldot-light = { version = "1.1.0", optional = true }
smoldot = { version = "1.1.0", optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "net", "sync", "macros", "io-util"], optional = true }
tokio-tungstenite = { version = "0.21", default-features = false, features = ["handshake"], optional = true }
rand = { version = "0.8", optional = true }
futures = { version = "0.3", features = ["thread-pool"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2.118"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
smoldot-light = { version = "1.1.0", optional = true, default-features = false }
smoldot = { version = "1.1.0", optional = true, default-features = false, features = ["std"] }
futures-util = "0.3"
pin-project = "1"
send_wrapper = { version = "0.6", features = ["futures"] }
web-time = "1"
web-sys = { version = "0.3", features = [
    "BinaryType",
    "CloseEvent",
    "console",
    "Event",
    "MessageEvent",
    "WebSocket",
] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "sync", "macros", "io-util", "time"] }
tokio-tungstenite = { version = "0.21", default-features = false, features = ["connect"] }
