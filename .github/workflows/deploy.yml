name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Webapp ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # ── StaticMCP files ────────────────────────────────────
      # Generated only at deploy time so the static JSON is shipped
      # alongside the webapp at /truapi-explorer/mcp/.
      - run: npm run mcp:build -- dist/mcp

      # ── Rust docs ──────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - run: cargo doc --no-deps --manifest-path truapi-spec/Cargo.toml

      - run: cp -r truapi-spec/target/doc dist/rustdoc

      # ── Upload ─────────────────────────────────────────────
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
