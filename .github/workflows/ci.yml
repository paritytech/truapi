name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace --all-targets --all-features

      - name: cargo +nightly fmt --check
        run: cargo +nightly fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

  codegen-drift:
    name: Codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install @parity/truapi deps
        run: npm ci --prefix js/packages/truapi

      - name: Run codegen
        run: ./scripts/codegen.sh

      - name: Verify generated output is committed
        run: |
          if ! git diff --quiet --exit-code -- \
              js/packages/truapi/src/generated \
              js/packages/truapi/src/playground \
              js/packages/truapi/src/explorer; then
            echo "::error::Generated TypeScript is out of date. Run ./scripts/codegen.sh and commit the result."
            git --no-pager diff -- \
              js/packages/truapi/src/generated \
              js/packages/truapi/src/playground \
              js/packages/truapi/src/explorer
            exit 1
          fi

  ts-client:
    name: '@parity/truapi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: npm ci --prefix js/packages/truapi

      - name: Build
        run: npm run build --prefix js/packages/truapi

      - name: Typecheck examples
        run: npm run typecheck:examples --prefix js/packages/truapi

      - name: Test
        run: npm test --prefix js/packages/truapi

  playground:
    name: Playground (build + lint)
    runs-on: ubuntu-latest
    needs: ts-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build @parity/truapi
        run: npm ci --prefix js/packages/truapi && npm run build --prefix js/packages/truapi

      - name: Install playground deps
        working-directory: playground
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: playground
        run: yarn build

      - name: Lint
        working-directory: playground
        run: yarn lint

  explorer:
    name: Explorer (build + lint)
    runs-on: ubuntu-latest
    needs: ts-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build @parity/truapi
        run: npm ci --prefix js/packages/truapi && npm run build --prefix js/packages/truapi

      - name: Install explorer deps
        run: npm ci --prefix explorer

      - name: Build
        run: npm run build --prefix explorer

      - name: Lint
        run: npm run lint --prefix explorer

  e2e:
    name: E2E (playground inside dotli)
    runs-on: ubuntu-latest
    needs: playground
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build @parity/truapi
        run: npm ci --prefix js/packages/truapi && npm run build --prefix js/packages/truapi

      - name: Install dotli deps
        working-directory: hosts/dotli
        run: bun install --frozen-lockfile

      - name: Install playground deps
        working-directory: playground
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: playground
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: playground
        run: yarn e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playground/playwright-report
          retention-days: 14
