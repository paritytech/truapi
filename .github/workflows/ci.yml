name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --workspace --all-targets --all-features

      - name: cargo +nightly fmt --check
        run: cargo +nightly fmt --check

      - name: cargo +nightly clippy
        run: cargo +nightly clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

  codegen:
    name: Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps
        run: npm ci

      - name: Run codegen
        run: ./scripts/codegen.sh

  ts-client:
    name: '@parity/truapi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build --prefix js/packages/truapi

      - name: Test
        run: npm test --prefix js/packages/truapi

  playground:
    name: Playground (build + lint)
    runs-on: ubuntu-latest
    needs: ts-client
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps + build @parity/truapi
        run: npm ci && ./scripts/codegen.sh

      - name: Install playground deps
        working-directory: playground
        run: yarn install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: playground/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('playground/yarn.lock') }}-${{ hashFiles('playground/src/**', 'playground/scripts/**', 'playground/public/**', 'playground/next.config.js', 'playground/tsconfig.json', 'playground/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('playground/yarn.lock') }}-

      - name: Build
        working-directory: playground
        run: yarn build

      - name: Lint
        working-directory: playground
        run: yarn lint

  explorer:
    name: Explorer (build + lint)
    runs-on: ubuntu-latest
    needs: ts-client
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps + build @parity/truapi
        run: npm ci && ./scripts/codegen.sh

      - name: Install explorer deps
        working-directory: explorer
        run: npm ci

      - name: Lint
        working-directory: explorer
        run: npm run lint

      - name: Build
        working-directory: explorer
        run: npm run build

  e2e:
    name: E2E (playground inside dotli)
    # Temporarily disabled while the dotli playground smoke test is stabilized.
    if: false
    runs-on: ubuntu-latest
    needs: playground
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build @parity/truapi
        run: npm ci && ./scripts/codegen.sh

      - name: Install dotli deps
        working-directory: hosts/dotli
        run: bun install --frozen-lockfile

      - name: Install playground deps
        working-directory: playground
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: playground
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: playground
        run: yarn e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playground/playwright-report
          retention-days: 14

  ci-status:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs: [rust, codegen, ts-client, playground, explorer, e2e]
    steps:
      - name: Check all jobs
        run: |
          results=(
            "${{ needs.rust.result }}"
            "${{ needs.codegen.result }}"
            "${{ needs.ts-client.result }}"
            "${{ needs.playground.result }}"
            "${{ needs.explorer.result }}"
            "${{ needs.e2e.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more CI jobs failed or were cancelled."
              exit 1
            fi
          done
          echo "All CI jobs passed."
