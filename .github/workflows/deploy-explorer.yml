name: Deploy Explorer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build package
        run: npm install --prefix js/packages/truapi && npm run build --prefix js/packages/truapi

      - name: Install explorer dependencies
        run: npm install --prefix explorer

      - name: Build explorer
        run: npm run build --prefix explorer

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: explorer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
