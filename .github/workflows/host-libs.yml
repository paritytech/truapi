name: host-libs
on:
  push:
    branches: [main]
    paths:
      - 'host-libs/**'
      - 'rust/crates/truapi-server/**'
  pull_request:
    paths:
      - 'host-libs/**'
      - 'rust/crates/truapi-server/**'

jobs:
  wasm-bundle-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack
      # Verifies `make wasm` completes against the current truapi-server
      # source. Does not assert byte-equality against the committed bundle:
      # wasm-pack output varies with the Rust toolchain and wasm-bindgen
      # version, so cross-machine reproducibility is not achievable. The
      # committed artifacts under host-libs/js/shared/dist/wasm/ serve as a
      # convenience for consumers that don't run Rust; regenerate locally
      # with `make wasm` before changing truapi-server source.
      - name: Rebuild WASM (build-only smoke)
        run: make wasm
      - name: Sanity-check artifact presence
        run: |
          test -s host-libs/js/shared/dist/wasm/web/truapi_server_bg.wasm
          test -s host-libs/js/shared/dist/wasm/web/truapi_server.js
          test -s host-libs/js/shared/dist/wasm/node/truapi_server_bg.wasm
          test -s host-libs/js/shared/dist/wasm/node/truapi_server.js
  host-libs-js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Build @parity/truapi-host (dep)
        run: cd js/packages/truapi-host && npm install --no-fund --no-audit && npm run build
      - name: Build @parity/truapi client (dep)
        run: cd js/packages/truapi && npm install --no-fund --no-audit && npm run build
      - name: Test @parity/host-shared
        run: cd host-libs/js/shared && npm install --no-fund --no-audit && npm test
      - name: Test @parity/host-web
        run: cd host-libs/js/web && npm install --no-fund --no-audit && npm test
      - name: Test @parity/host-electron
        run: cd host-libs/js/electron && npm install --no-fund --no-audit && npm test
