name: host-packages
on:
  push:
    branches: [main]
    paths:
      - 'js/packages/truapi-host-shared/**'
      - 'js/packages/truapi-host-web/**'
      - 'js/packages/truapi-host-electron/**'
      - 'android/**'
      - 'ios/**'
      - 'rust/crates/truapi-server/**'
  pull_request:
    paths:
      - 'js/packages/truapi-host-shared/**'
      - 'js/packages/truapi-host-web/**'
      - 'js/packages/truapi-host-electron/**'
      - 'android/**'
      - 'ios/**'
      - 'rust/crates/truapi-server/**'

jobs:
  wasm-bundle-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack
      # Verifies `make wasm` completes against the current truapi-server
      # source. Does not assert byte-equality against the committed bundle:
      # wasm-pack output varies with the Rust toolchain and wasm-bindgen
      # version, so cross-machine reproducibility is not achievable. The
      # committed artifacts under js/packages/truapi-host-shared/dist/wasm/
      # serve as a convenience for consumers that don't run Rust; regenerate
      # locally with `make wasm` before changing truapi-server source.
      - name: Rebuild WASM (build-only smoke)
        run: make wasm
      - name: Sanity-check artifact presence
        run: |
          test -s js/packages/truapi-host-shared/dist/wasm/web/truapi_server_bg.wasm
          test -s js/packages/truapi-host-shared/dist/wasm/web/truapi_server.js
          test -s js/packages/truapi-host-shared/dist/wasm/node/truapi_server_bg.wasm
          test -s js/packages/truapi-host-shared/dist/wasm/node/truapi_server.js
  host-packages-js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Build @parity/truapi-host (dep)
        run: cd js/packages/truapi-host && npm install --no-fund --no-audit && npm run build
      - name: Build @parity/truapi client (dep)
        run: cd js/packages/truapi && npm install --no-fund --no-audit && npm run build
      - name: Test @parity/truapi-host-shared
        run: cd js/packages/truapi-host-shared && npm install --no-fund --no-audit && npm test
      - name: Test @parity/truapi-host-web
        run: cd js/packages/truapi-host-web && npm install --no-fund --no-audit && npm test
      - name: Test @parity/truapi-host-electron
        run: cd js/packages/truapi-host-electron && npm install --no-fund --no-audit && npm test
