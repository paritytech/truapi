name: Release

# workflow_run is the intended gate for "release only after green CI". It is
# safe here: it fires only for CI runs on main or release branches (post-merge,
# trusted code), is
# guarded by conclusion == success and a release: commit subject, and checks
# out the pinned head_sha with persist-credentials: false. No untrusted PR code
# ever runs in this privileged context.
on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, release/v0.3.2]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Only run on green CI and only for commits whose subject starts with
    # "release:" — guards against accidental version bumps in unrelated PRs.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Resolve target packages
        id: version
        run: |
          set -euo pipefail
          packages=(
            "@parity/truapi js/packages/truapi"
            "@parity/truapi-host js/packages/truapi-host"
          )
          pending="$(mktemp)"
          for entry in "${packages[@]}"; do
            name="${entry%% *}"
            path="${entry#* }"
            version="$(jq -r '.version' "${path}/package.json")"
            tag="${name}@${version}"
            if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} already exists; skipping ${name}."
            else
              echo "Publishing ${tag}."
              echo "${name}|${path}|${version}|${tag}" >> "${pending}"
            fi
          done
          if [ -s "${pending}" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            {
              echo "packages<<EOF"
              cat "${pending}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No unpublished package tags found."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.version.outputs.proceed == 'true'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly

      - if: steps.version.outputs.proceed == 'true'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # stable
        with:
          toolchain: stable

      - if: steps.version.outputs.proceed == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - if: steps.version.outputs.proceed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.version.outputs.proceed == 'true'
        run: npm ci

      - name: Install wasm-pack
        if: steps.version.outputs.proceed == 'true' && contains(steps.version.outputs.packages, '@parity/truapi-host|')
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Build packages
        if: steps.version.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          ./scripts/codegen.sh
          if grep -q '^@parity/truapi-host|' <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"; then
            npm run build --prefix js/packages/truapi-host
            npm run build:wasm --prefix js/packages/truapi-host
          fi
        env:
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}

      - name: Tag release
        if: steps.version.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          tags=()
          while IFS='|' read -r name path version tag; do
            git tag "${tag}"
            tags+=("${tag}")
          done <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"
          git push origin "${tags[@]}"
        env:
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}

      - name: Pack package
        if: steps.version.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          mkdir -p artifacts
          while IFS='|' read -r name path version tag; do
            (cd "${path}" && npm pack --pack-destination "$GITHUB_WORKSPACE/artifacts/")
          done <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"
        env:
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}

      - name: Upload package artifacts
        if: steps.version.outputs.proceed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package
          path: artifacts/*.tgz

      - name: Publish via npm_publish_automation
        if: steps.version.outputs.proceed == 'true'
        uses: octokit/request-action@b91aabaa861c777dcdb14e2387e30eddf04619ae # v3.0.0
        with:
          route: POST /repos/paritytech/npm_publish_automation/actions/workflows/publish.yml/dispatches
          ref: main
          inputs: '${{ format(''{{ "repo": "{0}", "run_id": "{1}" }}'', github.repository, github.run_id) }}'
        env:
          GITHUB_TOKEN: ${{ secrets.NPM_PUBLISH_AUTOMATION_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}
        run: |
          set -euo pipefail
          while IFS='|' read -r name path version tag; do
            tarball_name="${name#@}"
            tarball_name="${tarball_name//\//-}-${version}.tgz"
            gh release create "${tag}" \
              --title "${name} ${version}" \
              --generate-notes \
              "artifacts/${tarball_name}"
          done <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"
