name: Release

# workflow_run is the intended gate for "release only after green CI". It is
# safe here: it fires only for CI runs on main or release branches (post-merge,
# trusted code), is
# guarded by conclusion == success and a release: commit subject, and checks
# out the pinned head_sha with persist-credentials: false. No untrusted PR code
# ever runs in this privileged context.
on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, release/v0.3.2]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Only run on green CI and only for commits whose subject starts with
    # "release:" — guards against accidental version bumps in unrelated PRs.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve target packages
        id: version
        env:
          RELEASE_COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          set -euo pipefail
          subject="${RELEASE_COMMIT_MESSAGE%%$'\n'*}"
          # Squash merges append " (#<pr>)" to the pull request title.
          subject="${subject% (#*)}"
          release="${subject#release: }"
          packages=""
          seen_names="|"

          IFS=',' read -ra targets <<< "${release}"
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "::error::Release subject does not declare a package and version: ${subject}"
            exit 1
          fi
          for target in "${targets[@]}"; do
            # Trim whitespace around comma-separated targets.
            target="${target#"${target%%[![:space:]]*}"}"
            target="${target%"${target##*[![:space:]]}"}"
            if [[ ! "${target}" =~ ^(@parity/truapi|@parity/truapi-host)[[:space:]]+([^[:space:]]+)$ ]]; then
              echo "::error::Unsupported release target '${target}' in subject: ${subject}"
              exit 1
            fi
            name="${BASH_REMATCH[1]}"
            declared_version="${BASH_REMATCH[2]}"

            if [[ "${seen_names}" == *"|${name}|"* ]]; then
              echo "::error::Release subject lists ${name} more than once."
              exit 1
            fi
            seen_names+="${name}|"

            case "${name}" in
              @parity/truapi) path="js/packages/truapi" ;;
              @parity/truapi-host) path="js/packages/truapi-host" ;;
            esac

            version="$(jq -r '.version' "${path}/package.json")"
            if [ "${declared_version}" != "${version}" ]; then
              echo "::error::Release subject declares ${name} ${declared_version}, but ${path}/package.json is ${version}."
              exit 1
            fi

            tag="${name}@${version}"
            if npm_status="$(npm view "${tag}" version --registry=https://registry.npmjs.org 2>&1)"; then
              echo "Package ${tag} already exists on npm; skipping."
            elif grep -Eq 'E404|404 Not Found' <<< "${npm_status}"; then
              echo "Publishing ${tag}."
              packages+="${name}|${path}|${version}|${tag}"$'\n'
            else
              echo "${npm_status}" >&2
              exit 1
            fi
          done

          if [ -z "${packages}" ]; then
            echo "All requested packages already exist on npm; nothing to publish."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            {
              echo "packages<<EOF"
              printf '%s' "${packages}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release manifests
        if: steps.version.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          npm run check-release-versions
          remaining_changesets="$(find .changeset -maxdepth 1 -type f -name '*.md' -print)"
          if [ -n "${remaining_changesets}" ]; then
            echo "::error::Release commit still contains unconsumed changesets. Run npm run version-packages."
            echo "${remaining_changesets}"
            exit 1
          fi

      - if: steps.version.outputs.proceed == 'true'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
          components: rustfmt

      - if: steps.version.outputs.proceed == 'true'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # stable
        with:
          toolchain: stable

      - if: steps.version.outputs.proceed == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dependencies
        if: steps.version.outputs.proceed == 'true'
        run: npm ci

      - name: Install wasm-pack
        if: steps.version.outputs.proceed == 'true' && contains(steps.version.outputs.packages, '@parity/truapi-host|')
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Build packages
        if: steps.version.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          ./scripts/codegen.sh
          if grep -q '^@parity/truapi-host|' <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"; then
            npm run build --prefix js/packages/truapi-host
            npm run build:wasm --prefix js/packages/truapi-host
          fi
        env:
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}

      - name: Pack package
        if: steps.version.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          mkdir -p artifacts
          while IFS='|' read -r name path version tag; do
            (cd "${path}" && npm pack --pack-destination "$GITHUB_WORKSPACE/artifacts/")
          done <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"
        env:
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}

      - name: Upload package artifacts
        if: steps.version.outputs.proceed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package
          path: artifacts/*.tgz

      - name: Attest package artifacts
        if: steps.version.outputs.proceed == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*.tgz

      - name: Publish via npm_publish_automation
        if: steps.version.outputs.proceed == 'true'
        uses: octokit/request-action@b91aabaa861c777dcdb14e2387e30eddf04619ae # v3.0.0
        with:
          route: POST /repos/paritytech/npm_publish_automation/actions/workflows/publish.yml/dispatches
          ref: main
          inputs: '${{ format(''{{ "repo": "{0}", "run_id": "{1}" }}'', github.repository, github.run_id) }}'
        env:
          GITHUB_TOKEN: ${{ secrets.NPM_PUBLISH_AUTOMATION_TOKEN }}

      - name: Create release tags
        if: steps.version.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}
        run: |
          set -euo pipefail
          while IFS='|' read -r name path version tag; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists; skipping create."
              continue
            fi
            gh api --method POST "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/${tag}" \
              -f sha="${RELEASE_SHA}"
          done <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"

      - name: Create GitHub Release
        if: steps.version.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_VERSION_OUTPUTS_PACKAGES: ${{ steps.version.outputs.packages }}
        run: |
          set -euo pipefail
          while IFS='|' read -r name path version tag; do
            tarball_name="${name#@}"
            tarball_name="${tarball_name//\//-}-${version}.tgz"
            if gh release view "${tag}" >/dev/null 2>&1; then
              gh release upload "${tag}" "artifacts/${tarball_name}" --clobber
            else
              gh release create "${tag}" \
                --title "${name} ${version}" \
                --generate-notes \
                "artifacts/${tarball_name}"
            fi
          done <<< "${STEPS_VERSION_OUTPUTS_PACKAGES}"
