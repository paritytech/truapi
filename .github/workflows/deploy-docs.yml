name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Rust API docs
        run: cargo doc -p truapi --no-deps

      - name: Redirect site root to crate docs
        run: |
          cat > target/doc/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./truapi/">
              <link rel="canonical" href="./truapi/">
              <title>TrUAPI Docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="./truapi/">TrUAPI docs</a>…</p>
            </body>
          </html>
          EOF
          cp target/doc/index.html target/doc/404.html
          touch target/doc/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
