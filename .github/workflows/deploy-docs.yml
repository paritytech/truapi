name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Rust API docs
        run: cargo doc -p truapi --no-deps

      - name: Build @parity/truapi
        run: npm ci --prefix js/packages/truapi && npm run build --prefix js/packages/truapi

      - name: Install playground dependencies
        working-directory: playground
        run: yarn install --frozen-lockfile

      - name: Build playground (static export)
        working-directory: playground
        run: yarn build

      - name: Assemble GitHub Pages site
        run: |
          rm -rf site
          mkdir -p site
          # Playground at root.
          cp -R playground/out/. site/
          # truapi crate's cargo doc mounted directly at /cargo_doc/ (so URLs
          # are /cargo_doc/api/trait.X.html, not /cargo_doc/truapi/...).
          mkdir -p site/cargo_doc
          cp -R target/doc/truapi/. site/cargo_doc/
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
