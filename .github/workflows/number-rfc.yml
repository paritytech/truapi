name: Number RFC

on:
  push:
    branches: [main]
    paths:
      - 'docs/rfcs/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  number-rfc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Number unnumbered RFCs
        run: |
          cd docs/rfcs

          UNNUMBERED=()
          for f in *.md; do
            case "$f" in
              _index.md|[0-9][0-9][0-9][0-9]-*) continue ;;
              *) UNNUMBERED+=("$f") ;;
            esac
          done

          if [ ${#UNNUMBERED[@]} -eq 0 ]; then
            echo "No unnumbered RFCs found."
          else
            MAX=0
            for f in [0-9][0-9][0-9][0-9]-*.md; do
              [ -e "$f" ] || continue
              NUM=$(echo "$f" | grep -oE '^[0-9]+' | sed 's/^0*//')
              [ "${NUM:-0}" -gt "$MAX" ] && MAX="$NUM"
            done

            for DRAFT in "${UNNUMBERED[@]}"; do
              MAX=$((MAX + 1))
              PADDED=$(printf '%04d' "$MAX")
              SLUG="${DRAFT%.md}"
              NEW_NAME="${PADDED}-${SLUG}.md"
              echo "Numbering: $DRAFT -> $NEW_NAME (RFC $PADDED)"
              git mv "$DRAFT" "$NEW_NAME"
              sed -i -E "s/^# RFC — /# RFC ${PADDED} — /" "$NEW_NAME"
              sed -i -E "s/^# RFC [0-9]+ — /# RFC ${PADDED} — /" "$NEW_NAME"
            done
          fi

      - name: Rebuild _index.md from RFC files on disk
        run: |
          cd docs/rfcs

          # Extract title and owner from an RFC file.
          # Supports both YAML frontmatter (title:/owner:) and markdown table
          # (| **Authors** | ... | or | Author | ... |) formats.
          extract_meta() {
            local file="$1" title="" owner="" st=""

            # Try YAML frontmatter (between --- delimiters)
            if head -1 "$file" | grep -q '^---$'; then
              title=$(awk '/^---$/{n++; next} n==1 && /^title:/{print; exit}' "$file" | sed 's/^title: *"*//; s/"*$//')
              owner=$(awk '/^---$/{n++; next} n==1 && /^owner:/{print; exit}' "$file" | sed 's/^owner: *"*//; s/"*$//')
              st=$(awk '/^---$/{n++; next} n==1 && /^status:/{print; exit}' "$file" | sed 's/^status: *//; s/ *$//')
            fi

            # Fall back to first H1 heading for title (strip RFC prefix)
            if [ -z "$title" ]; then
              title=$(grep -m1 '^# ' "$file" | sed 's/^# *//; s/^RFC[-— ]*[0-9]*[—: ]*//' | sed 's/^ *//')
            fi

            # Fall back to markdown table for owner (handles both | Author | and | **Authors** |)
            if [ -z "$owner" ]; then
              owner=$(grep -iE '^\| *\*{0,2}Authors?\*{0,2}' "$file" | head -1 \
                | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); print $3}')
            fi

            : "${st:=accepted}"
            echo "${title}|${owner}|${st}"
          }

          # Preserve the frontmatter and table header from the existing _index.md
          # (everything up to and including the header separator line)
          HEADER_END=$(grep -n '^| *---' _index.md | tail -1 | cut -d: -f1)
          head -n "$HEADER_END" _index.md > _index.md.tmp

          # Rebuild rows from all numbered RFC files on disk (sorted)
          for f in $(ls [0-9][0-9][0-9][0-9]-*.md 2>/dev/null | sort); do
            PADDED=$(echo "$f" | grep -oE '^[0-9]{4}')
            META=$(extract_meta "$f")
            TITLE=$(echo "$META" | cut -d'|' -f1)
            OWNER=$(echo "$META" | cut -d'|' -f2)
            STATUS=$(echo "$META" | cut -d'|' -f3)

            # Look up the PR link from the old index if it exists
            PR=$(grep "^| *${PADDED}" _index.md | sed 's/.*| *\(\[#[0-9]*\]([^)]*)\) *|.*/\1/' | grep '^\[#' || true)
            : "${PR:=—}"

            printf '| %s   | [%s](%s) | %-18s | %-13s | %s |\n' \
              "$PADDED" "$TITLE" "$f" "$STATUS" "$OWNER" "$PR"
          done >> _index.md.tmp

          mv _index.md.tmp _index.md

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet && git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          BRANCH="ci/update-rfc-index-$(date +%s)"
          git checkout -b "$BRANCH"
          git add docs/rfcs/
          git commit -m "Update RFC index"
          git push origin "$BRANCH"
          gh pr create \
            --title "ci: update RFC index" \
            --body "Auto-generated by the number-rfc workflow." \
            --head "$BRANCH" \
            --base main \
            --reviewer paritytech/host-sdk-team
