# cargo-deny configuration. Run `cargo deny check licenses`.
# Outbound licence is MIT; only permissive inbound licences are allowed,
# with a scoped exception for the smoldot light-client crates: their
# Classpath exception explicitly permits linking from differently-licensed
# code.

[graph]
# Resolve the worst-case graph so optional backends (e.g. truapi-provider's
# smoldot feature) are covered by the license gate.
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

# Scoped per-crate licence exceptions, disallowed everywhere else:
# - smoldot / smoldot-light are GPL-3.0-or-later WITH Classpath-exception-2.0,
#   whose Classpath exception permits linking from the MIT outbound licence.
# - uniffi is MPL-2.0: file-level weak copyleft, consumed unmodified as a
#   dependency, which MPL-2.0 permits without affecting the MIT outbound licence.
exceptions = [
    { name = "smoldot", allow = ["GPL-3.0-or-later WITH Classpath-exception-2.0"] },
    { name = "smoldot-light", allow = ["GPL-3.0-or-later WITH Classpath-exception-2.0"] },
    { name = "uniffi", allow = ["MPL-2.0"] },
    { name = "uniffi_bindgen", allow = ["MPL-2.0"] },
    { name = "uniffi_core", allow = ["MPL-2.0"] },
    { name = "uniffi_internal_macros", allow = ["MPL-2.0"] },
    { name = "uniffi_macros", allow = ["MPL-2.0"] },
    { name = "uniffi_meta", allow = ["MPL-2.0"] },
    { name = "uniffi_pipeline", allow = ["MPL-2.0"] },
    { name = "uniffi_udl", allow = ["MPL-2.0"] },
]
