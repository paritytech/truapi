# cargo-deny configuration. Run `cargo deny check licenses`.
# Outbound licence is MIT; only permissive inbound licences are allowed.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

# uniffi is MPL-2.0: file-level weak copyleft, consumed unmodified as a
# dependency, which MPL-2.0 permits without affecting the MIT outbound licence.
# Scoped per crate so MPL-2.0 stays disallowed everywhere else.
exceptions = [
    # Ring-VRF implementation shared with the Individuality runtimes and Nova.
    # The Classpath exception permits linking it without changing this crate's
    # MIT outbound licence.
    { name = "verifiable", allow = ["GPL-3.0-or-later WITH Classpath-exception-2.0"] },
    { name = "uniffi", allow = ["MPL-2.0"] },
    { name = "uniffi_bindgen", allow = ["MPL-2.0"] },
    { name = "uniffi_core", allow = ["MPL-2.0"] },
    { name = "uniffi_internal_macros", allow = ["MPL-2.0"] },
    { name = "uniffi_macros", allow = ["MPL-2.0"] },
    { name = "uniffi_meta", allow = ["MPL-2.0"] },
    { name = "uniffi_pipeline", allow = ["MPL-2.0"] },
    { name = "uniffi_udl", allow = ["MPL-2.0"] },
]
